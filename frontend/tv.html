<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Node Monitor — TV Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 48px;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.05em;
        }

        .logo span { color: #22c55e; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #22c55e;
            font-weight: 600;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .clock {
            font-size: 1.1rem;
            color: #64748b;
            font-variant-numeric: tabular-nums;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2px;
            background: #1e293b;
        }

        .panel {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            transition: background 0.5s;
        }

        .panel-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        /* Temperature big display */
        .temp-panel {
            grid-column: 1;
            grid-row: 1 / 3;
        }

        .temp-value {
            font-size: 9rem;
            font-weight: 900;
            color: #22c55e;
            line-height: 1;
            transition: color 0.5s;
        }

        .temp-unit {
            font-size: 3rem;
            font-weight: 300;
            color: #64748b;
        }

        .temp-status {
            margin-top: 24px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #22c55e;
            padding: 8px 24px;
            border-radius: 9999px;
            border: 2px solid #22c55e;
            transition: all 0.5s;
        }

        .temp-panel.warm .temp-value,
        .temp-panel.warm .temp-status { color: #f59e0b; }
        .temp-panel.warm .temp-status { border-color: #f59e0b; }

        .temp-panel.hot {
            background: #1a0a0a;
            animation: alert-bg 1s infinite;
        }
        .temp-panel.hot .temp-value,
        .temp-panel.hot .temp-status { color: #ef4444; }
        .temp-panel.hot .temp-status { border-color: #ef4444; }

        @keyframes alert-bg {
            0%, 100% { background: #1a0a0a; }
            50% { background: #0f0505; }
        }

        /* Humidity */
        .humidity-panel {
            grid-column: 2;
            grid-row: 1;
        }

        .humidity-value {
            font-size: 5rem;
            font-weight: 800;
            color: #60a5fa;
            line-height: 1;
        }

        /* Device status */
        .status-panel {
            grid-column: 3;
            grid-row: 1;
        }

        .actuator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            margin-top: 8px;
        }

        .actuator-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .actuator-card.on {
            border-color: #22c55e;
            background: #0d2818;
            box-shadow: 0 0 20px #22c55e30;
        }

        .actuator-icon {
            font-size: 2.5rem;
            line-height: 1;
        }

        .actuator-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
        }

        .actuator-card.on .actuator-label {
            color: #22c55e;
        }

        .actuator-state {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 9999px;
            background: #334155;
            color: #64748b;
        }

        .actuator-card.on .actuator-state {
            background: #22c55e;
            color: #0f172a;
        }

        /* Chart */
        .chart-panel {
            grid-column: 2 / 4;
            grid-row: 2;
            padding: 24px 40px;
        }

        .chart-panel canvas {
            max-height: 200px;
        }

        /* Last update */
        .last-update {
            font-size: 0.8rem;
            color: #334155;
            margin-top: 12px;
        }

        /* Alert overlay */
        .alert-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px;
            background: #ef4444;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            z-index: 100;
            animation: slide-in 0.3s ease;
        }

        .alert-overlay.visible { display: block; }

        @keyframes slide-in {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="alert-overlay" id="alertBanner">
    🚨 TEMPERATURA CRITICA — INTERVENTO RICHIESTO
</div>

<header>
    <div class="logo">📊 Smart Node <span>Monitor</span></div>
    <div class="header-right">
        <div class="live-badge"><div class="dot"></div> LIVE</div>
        <div class="clock" id="clock">--:--:--</div>
    </div>
</header>

<main>
    <!-- Temperatura -->
    <div class="panel temp-panel" id="tempPanel">
        <div class="panel-label">Temperatura</div>
        <div>
            <span class="temp-value" id="tempValue">--</span>
            <span class="temp-unit">°C</span>
        </div>
        <div class="temp-status" id="tempStatus">In attesa...</div>
        <div class="last-update" id="lastUpdate">--</div>
    </div>

    <!-- Umidità -->
    <div class="panel humidity-panel">
        <div class="panel-label">Umidità</div>
        <div class="humidity-value" id="humValue">--%</div>
    </div>

    <!-- Stato dispositivo -->
    <div class="panel status-panel">
        <div class="panel-label">Stato Dispositivo</div>
        <div class="actuator-grid">
            <div class="actuator-card" id="ledIndicator">
                <div class="actuator-icon">💡</div>
                <div class="actuator-label">LED</div>
                <div class="actuator-state" id="ledState">OFF</div>
            </div>
            <div class="actuator-card" id="buzzerIndicator">
                <div class="actuator-icon">🔊</div>
                <div class="actuator-label">Buzzer</div>
                <div class="actuator-state" id="buzzerState">OFF</div>
            </div>
        </div>
    </div>

    <!-- Grafico -->
    <div class="panel chart-panel">
        <div class="panel-label" style="align-self:flex-start">Andamento Temperatura</div>
        <canvas id="tvChart"></canvas>
    </div>
</main>

<script type="module">
import { subscribeToSensorData } from './js/supabase-client.js'
import { API_BASE } from './js/config.js'

const API = `${API_BASE}/api`

// Clock
setInterval(() => {
    document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('it-IT')
}, 1000)

// Chart
const ctx = document.getElementById('tvChart').getContext('2d')
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            data: [],
            borderColor: '#22c55e',
            backgroundColor: 'rgba(34,197,94,0.08)',
            borderWidth: 3,
            pointRadius: 2,
            tension: 0.4,
            fill: true,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        animation: { duration: 400 },
        plugins: { legend: { display: false } },
        scales: {
            x: { ticks: { color: '#475569', maxTicksLimit: 10 }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#475569', callback: v => v + '°C' }, grid: { color: '#1e293b' }, min: 10, max: 50 }
        }
    }
})

function updateTempUI(temp) {
    document.getElementById('tempValue').textContent = temp
    const panel = document.getElementById('tempPanel')
    const status = document.getElementById('tempStatus')
    const alert = document.getElementById('alertBanner')
    panel.classList.remove('warm', 'hot')

    if (temp > 30) {
        panel.classList.add('hot')
        status.textContent = '🚨 TEMPERATURA CRITICA'
        alert.classList.add('visible')
        chart.data.datasets[0].borderColor = '#ef4444'
    } else if (temp > 25) {
        panel.classList.add('warm')
        status.textContent = '⚠️ Temperatura Elevata'
        alert.classList.remove('visible')
        chart.data.datasets[0].borderColor = '#f59e0b'
    } else {
        status.textContent = '✅ Temperatura Normale'
        alert.classList.remove('visible')
        chart.data.datasets[0].borderColor = '#22c55e'
    }
    chart.update()
}

async function loadLatest() {
    try {
        const res = await fetch(`${API}/sensor-data/latest`)
        const data = await res.json()
        if (!data) return
        updateTempUI(data.temperature)
        document.getElementById('humValue').textContent =
            data.humidity != null ? `${data.humidity}%` : '--%'
        document.getElementById('lastUpdate').textContent =
            `Aggiornato: ${new Date(data.timestamp).toLocaleTimeString('it-IT')}`
    } catch(e) {}
}

async function loadHistory() {
    try {
        const res = await fetch(`${API}/sensor-data/history?limit=30`)
        const data = await res.json()
        if (!Array.isArray(data)) return
        chart.data.labels = data.map(r =>
            new Date(r.timestamp).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }))
        chart.data.datasets[0].data = data.map(r => r.temperature)
        chart.update()
    } catch(e) {}
}

async function loadActuators() {
    for (const type of ['led', 'buzzer']) {
        try {
            const res = await fetch(`${API}/actuator/${type}/state`)
            const data = await res.json()
            const card = document.getElementById(`${type}Indicator`)
            const stateEl = document.getElementById(`${type}State`)
            card.classList.toggle('on', data.state)
            stateEl.textContent = data.state ? 'ON' : 'OFF'
        } catch(e) {}
    }
}

// Init
loadLatest()
loadHistory()
loadActuators()
setInterval(loadLatest, 5000)
setInterval(loadHistory, 15000)
setInterval(loadActuators, 5000)

// Realtime
subscribeToSensorData((d) => {
    updateTempUI(d.temperature)
    if (d.humidity) document.getElementById('humValue').textContent = `${d.humidity}%`
    loadHistory()
})
</script>
</body>
</html>
