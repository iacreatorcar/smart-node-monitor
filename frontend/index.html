<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Node Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Smart Node Monitor</h1>
            <div class="status">
                <span class="dot connected" id="statusDot"></span>
                <span id="statusText">Connesso</span>
            </div>
        </header>

        <main>
            <div class="card temperature-card">
                <div class="label">Temperatura Attuale</div>
                <div class="value" id="currentTemp">--°C</div>
                <div class="timestamp" id="lastUpdate">In attesa di dati...</div>
            </div>

            <div class="card chart-card">
                <h3>Andamento Temperatura</h3>
                <canvas id="temperatureChart"></canvas>
            </div>

            <div class="card controls-card">
                <h3>Controllo Dispositivo</h3>
                <button id="ledToggle" class="btn btn-led">💡 Accendi LED</button>
                <button id="buzzerToggle" class="btn btn-buzzer">🔊 Attiva Buzzer</button>
                <button onclick="window.open('tv.html','_blank')" class="btn btn-tv">📺 Monitor TV</button>
            </div>

            <div class="card data-table">
                <h3>Dati Recenti</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Temperatura</th>
                            <th>Umidità</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="3" style="text-align:center;color:#64748b;padding:20px">In attesa di dati...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <footer style="text-align:center;padding:24px;margin-top:8px;border-top:1px solid #1e293b;font-size:0.78rem;color:#334155;font-family:'Segoe UI',sans-serif;">
        Ideato e progettato da <a href="https://cdalise.com" target="_blank" style="color:#475569;text-decoration:none;font-weight:600;">Carmine Dalise</a> &nbsp;·&nbsp; 2026
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
